<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testing Checklist — Laptop Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --navy:#0B1833;
  --navy2:#162B55;
  --accent:#C8880A;
  --accentL:#E8A020;
  --green:#22C55E;
  --red:#EF4444;
  --bg:#EDF1F8;
  --card:#FFFFFF;
  --text:#0B1833;
  --textM:#476090;
  --textF:#8A9BB5;
  --border:#D6DFF0;
  --hover:#F5F8FF;
  --doneB:#F0FBF4;
  --doneT:#9BB5A5;
  --th-bg:#EAF0F8;
}

body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.hdr{background:var(--navy);padding:18px 32px;position:sticky;top:0;z-index:200;border-bottom:3px solid var(--accent)}
.hdr-in{max-width:1500px;margin:0 auto;display:flex;align-items:center;gap:22px}
.hdr-t h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:25px;color:#fff;letter-spacing:4px;text-transform:uppercase;line-height:1}
.hdr-t p{font-size:8.5px;font-weight:600;color:var(--accentL);letter-spacing:2.5px;text-transform:uppercase;margin-top:4px}
.hdr-prog{flex:1;min-width:0}
.hdr-pm{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.hdr-pl{font-size:8.5px;font-weight:600;color:rgba(255,255,255,.45);letter-spacing:2px;text-transform:uppercase}
.hdr-pv{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--accentL)}
.hdr-tk{height:5px;background:rgba(255,255,255,.12);border-radius:3px;overflow:hidden}
.hdr-fi{height:100%;background:var(--accentL);border-radius:3px;transition:width .4s ease;width:0%}
.hdr-btns{display:flex;gap:8px;flex-shrink:0}
.btn{font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;padding:7px 13px;border-radius:7px;cursor:pointer;border:none;transition:all .18s;letter-spacing:.3px}
.btn-g{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.2)}
.btn-g:hover{background:rgba(255,255,255,.18);color:#fff}
.btn-a{background:var(--accent);color:#fff}
.btn-a:hover{background:var(--accentL)}

/* MAIN */
.main{max-width:1500px;margin:0 auto;padding:24px 32px 48px}

.pg-lbl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:8.5px;letter-spacing:3px;color:var(--textF);text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.pg-lbl::after{content:'';flex:1;height:1px;background:var(--border)}

/* GRID LAYOUTS */
.row-asymm{display:grid;grid-template-columns:1fr 2.1fr;gap:12px;margin-bottom:12px}
.row-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.row-1{margin-bottom:12px}

/* SECTION CARD */
.sc{background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;transition:box-shadow .2s}
.sc:hover{box-shadow:0 4px 18px rgba(11,24,51,.09)}

.sc-hd{background:var(--navy);padding:11px 14px 9px}
.sc-hd-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.sc-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:27px;color:rgba(255,255,255,.18);line-height:1;letter-spacing:-1px;flex-shrink:0;min-width:36px}
.sc-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11.5px;color:#fff;letter-spacing:1.8px;text-transform:uppercase;flex:1;line-height:1.25}
.sc-all{background:none;border:none;font-size:8.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.35);cursor:pointer;padding:2px 0;transition:color .15s;flex-shrink:0}
.sc-all:hover{color:var(--accentL)}

.sc-pb-row{display:flex;align-items:center;gap:8px}
.sc-pb-track{flex:1;height:3px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden}
.sc-pb-fill{height:100%;background:var(--accentL);border-radius:2px;transition:width .3s ease;width:0%}
.sc-pb-txt{font-size:8.5px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.5px;min-width:26px;text-align:right}

/* TABLE HEADER ROW */
.tbl-hdr{display:grid;gap:0;background:var(--th-bg);border-bottom:1.5px solid var(--border);padding:5px 12px}
.tbl-hdr span{font-family:'Barlow Condensed',sans-serif;font-size:8.5px;font-weight:700;letter-spacing:1.2px;color:var(--textM);text-transform:uppercase}

/* Standard 4-col: # | ITEM | ✓ | REMARKS */
.th-std{grid-template-columns:18px 1fr 28px 1fr}
.th-oem-sw{grid-template-columns:18px 1fr 28px 1fr}

/* ITEM ROWS */
.ci{display:grid;align-items:center;gap:0;padding:7px 12px;cursor:default;border-bottom:1px solid #EEF2FC;transition:background .12s;user-select:none;-webkit-user-select:none}
.ci:last-child{border-bottom:none}
.ci:hover{background:var(--hover)}
.ci.done{background:var(--doneB)}

/* std 4-col grid for items */
.ci-std{grid-template-columns:18px 1fr 28px 1fr}

/* Checkbox area */
.ci-num{font-family:'Barlow Condensed',sans-serif;font-size:10.5px;font-weight:700;color:var(--textF)}
.chk-wrap{display:flex;align-items:center;justify-content:center}
.chk{width:14px;height:14px;border:1.5px solid #BECCDE;border-radius:3px;flex-shrink:0;position:relative;transition:all .18s;background:#fff;cursor:pointer}
.ci.done .chk{background:var(--green);border-color:var(--green)}
.ci.done .chk::before{content:'';position:absolute;left:2.5px;top:-0.5px;width:4px;height:7.5px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg)}
.chk:hover{border-color:var(--navy2)}
.ci-txt{font-size:12.5px;font-weight:400;color:var(--text);line-height:1.3;transition:color .18s;padding-right:6px}
.ci.done .ci-txt{color:var(--doneT);text-decoration:line-through;text-decoration-color:var(--doneT)}
.ci-remarks{width:100%}
.rmk-inp{width:100%;border:none;border-bottom:1px solid var(--border);background:transparent;font-family:'Outfit',sans-serif;font-size:11px;color:var(--text);padding:2px 4px;outline:none;transition:border-color .18s}
.rmk-inp::placeholder{color:#C5D0E2;font-style:italic}
.rmk-inp:focus{border-color:var(--navy2)}
.ci.done .rmk-inp{color:var(--textF)}

/* OEM section — dual sub-table */
.oem-grid{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border)}
.oem-col{border-right:1px solid var(--border)}
.oem-col:last-child{border-right:none}
.oem-col-hdr{background:var(--navy2);padding:5px 10px}
.oem-col-hdr span{font-family:'Barlow Condensed',sans-serif;font-size:8.5px;font-weight:700;letter-spacing:1.2px;color:rgba(255,255,255,.7);text-transform:uppercase}

/* OEM item grid: # | ITEM | ✓ | REMARKS */
.oem-ci{display:grid;grid-template-columns:18px 1fr 28px 1fr;align-items:center;gap:0;padding:6px 10px;border-bottom:1px solid #EEF2FC;cursor:default;transition:background .12s}
.oem-ci:last-child{border-bottom:none}
.oem-ci:hover{background:var(--hover)}
.oem-ci.done{background:var(--doneB)}
.oem-ci.done .ci-txt{color:var(--doneT);text-decoration:line-through;text-decoration-color:var(--doneT)}
.oem-ci.done .chk{background:var(--green);border-color:var(--green)}
.oem-ci.done .chk::before{content:'';position:absolute;left:2.5px;top:-0.5px;width:4px;height:7.5px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg)}

/* NOTES SECTION */
.notes-card{background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden}
.notes-area{padding:0}
.notes-lines{padding:12px 16px}
.note-line{border-bottom:1px dashed var(--border);height:28px;margin-bottom:0}
.note-line:last-child{border-bottom:none}
.notes-input{width:100%;min-height:120px;border:none;padding:14px 16px;font-family:'Outfit',sans-serif;font-size:13px;color:var(--text);resize:vertical;outline:none;line-height:1.7;background:var(--card)}
.notes-input::placeholder{color:var(--textF);font-style:italic}

/* TEST SUMMARY TABLE */
.summary-card{background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:12px}
.summary-tbl{width:100%;border-collapse:collapse}
.summary-tbl th{background:var(--th-bg);font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.2px;color:var(--textM);text-transform:uppercase;padding:7px 12px;border-bottom:1.5px solid var(--border);text-align:left}
.summary-tbl td{padding:8px 12px;border-bottom:1px solid #EEF2FC;font-size:12.5px;color:var(--text)}
.summary-tbl tr:last-child td{border-bottom:none}
.summary-tbl .total-row td{font-weight:600;background:var(--th-bg);font-size:13px}
.summary-tbl .num-cell{text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700}
.num-pass{color:var(--green)}
.num-fail{color:var(--red)}
.num-na{color:var(--textF)}
.summary-tbl .rmk-cell .rmk-inp{font-size:12px}
.cat-cell{font-weight:500}

/* TIP */
.tip{background:var(--navy);border-radius:10px;padding:14px 18px;display:flex;align-items:flex-start;gap:12px;margin-top:4px}
.tip-ico{font-size:20px;flex-shrink:0;margin-top:2px}
.tip-lbl{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:2.5px;color:var(--accentL);text-transform:uppercase;margin-bottom:3px}
.tip-txt{font-size:12px;font-weight:400;color:rgba(255,255,255,.7);line-height:1.55}

/* Print */
@media print{
  .hdr{position:static}
  .hdr-btns,.sc-all{display:none!important}
  body{background:#fff}
  .sc{box-shadow:none;border:1px solid #ccc;break-inside:avoid}
  .main{padding:14px}
  .row-asymm,.row-3,.row-2{grid-template-columns:unset;display:block}
  .row-asymm .sc,.row-3 .sc,.row-2 .sc{margin-bottom:8px}
}

@media(max-width:1100px){
  .row-asymm{grid-template-columns:1fr}
  .row-3{grid-template-columns:1fr 1fr}
  .oem-grid{grid-template-columns:1fr}
}
@media(max-width:700px){
  .row-3,.row-2{grid-template-columns:1fr}
  .ci-std{grid-template-columns:18px 1fr 28px}
  .th-std{grid-template-columns:18px 1fr 28px}
  .ci-remarks{display:none}
  .main{padding:14px}
  .hdr{padding:12px 16px}
  .hdr-in{flex-wrap:wrap;gap:10px}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-in">
    <div class="hdr-t">
      <h1>Testing <span style="color:var(--accentL)">Checklist</span></h1>
      <p>Laptop / Tech Review</p>
    </div>
    <div class="hdr-prog">
      <div class="hdr-pm">
        <span class="hdr-pl">Overall Progress</span>
        <span class="hdr-pv" id="ov-count">0 / 0</span>
      </div>
      <div class="hdr-tk"><div class="hdr-fi" id="ov-fill"></div></div>
    </div>
    <div class="hdr-btns">
      <button class="btn btn-g" onclick="resetAll()">↺ Reset</button>
      <button class="btn btn-a" onclick="window.print()">⎙ Print</button>
    </div>
  </div>
</div>

<main class="main" id="root"></main>

<script>
/* ===== DATA ===== */
const DATA = {
  s01: {id:'01', title:'INITIAL SETUP', items:[
    'Windows Update','Driver Update','BIOS Check','Performance Mode Setup'
  ]},
  s02: {id:'02', title:'OEM SOFTWARE / CONTROL CENTER TEST', special:'oem',
    col1:{label:'SOFTWARE / APP', items:['Lenovo Vantage','Legion Space','Armoury Crate','MyASUS','Alienware Command Center','MyDell','OMEN Gaming Hub','HP Support Assistant','AcerSense','NitroSense','PredatorSense','Samsung Settings']},
    col2:{label:'WHAT TO CHECK', items:['Performance Modes','Fan Control','MUX Switch / GPU Mode','RGB Control','Battery Limiter','Driver Updates','AI Features','Resource Monitoring','GPU Switching','Custom Profiles']}
  },
  s03: {id:'03', title:'PRODUCTIVITY & WORKFLOW', items:[
    'Multitasking Test','MS Office Workflow','Premiere Pro Test','DaVinci Resolve Test','After Effects Test','Photoshop Test','Visual Studio Code','Android Studio Build Test'
  ]},
  s04: {id:'04', title:'BENCHMARK TESTS', items:[
    'HWiNFO Monitoring','Cinebench R23','Cinebench 2024','Geekbench CPU','Geekbench OpenCL','Geekbench AI','3DMark','PCMark 10','CrossMark','SSD Speed Test','Blender Benchmark'
  ]},
  s05: {id:'05', title:'THERMAL TESTING', items:[
    'Idle Temperature','Load Temperature','Surface Temperature','Keyboard Hotspot Check','Thermal Throttling Check'
  ]},
  s06: {id:'06', title:'BATTERY TESTING', items:[
    'Video Playback Battery Test','Charging Speed Test'
  ]},
  s07: {id:'07', title:'DISPLAY TESTING', items:[
    'Refresh Rate Test','Brightness Test','Color Accuracy','Ghosting Test','Backlight Bleed Test'
  ]},
  s08: {id:'08', title:'AUDIO & WEBCAM TESTING', items:[
    'Audio Playback Test','Speaker Test','Mic Test','Webcam Test','Noise Suppression Test'
  ]},
  s09: {id:'09', title:'SYSTEM & STABILITY TESTING', items:[
    'System Stability Test (Stress Test)','CPU Stress Test','GPU Stress Test','RAM Stability Test','Storage Stress Test','Long Duration Stability Test','Blue Screen / Crash Test','Sleep / Hibernate / Wake Test'
  ]},
  s10: {id:'10', title:'CONNECTIVITY TESTING', items:[
    'Wi-Fi Speed Test (2.4GHz & 5GHz)','Bluetooth Test (Devices & Range)','LAN / Ethernet Test','Hotspot Connection Test'
  ]}
};

/* ===== SUMMARY META ===== */
const SUMMARY_CATS = [
  {label:'Initial Setup', key:'s01'},
  {label:'OEM Software / Control Center', key:'s02'},
  {label:'Productivity & Workflow', key:'s03'},
  {label:'Benchmark Tests', key:'s04'},
  {label:'Thermal Testing', key:'s05'},
  {label:'Battery Testing', key:'s06'},
  {label:'Display Testing', key:'s07'},
  {label:'Audio & Webcam Testing', key:'s08'},
  {label:'System & Stability Testing', key:'s09'},
  {label:'Connectivity Testing', key:'s10'},
];

/* ===== STATE ===== */
const state = {};  /* key: "sXX-col-idx" => {done:bool, remark:''} */

function initState() {
  Object.entries(DATA).forEach(([sk, sd]) => {
    if (sd.special === 'oem') {
      sd.col1.items.forEach((_, i) => state[sk+'-c1-'+i] = {done:false, remark:''});
      sd.col2.items.forEach((_, i) => state[sk+'-c2-'+i] = {done:false, remark:''});
    } else if (sd.items) {
      sd.items.forEach((_, i) => state[sk+'-'+i] = {done:false, remark:''});
    }
  });
}

function totalItems() { return Object.keys(state).length; }
function checkedItems() { return Object.values(state).filter(v => v.done).length; }

function sectionKeys(sk) {
  return Object.keys(state).filter(k => k.startsWith(sk+'-'));
}
function sectionTotal(sk) { return sectionKeys(sk).length; }
function sectionDone(sk) { return sectionKeys(sk).filter(k => state[k].done).length; }

function toggleItem(key, elId) {
  state[key].done = !state[key].done;
  const el = document.getElementById(elId);
  if (el) el.classList.toggle('done', state[key].done);
  const sk = key.split('-')[0];
  updSec(sk);
  updAll();
  updSummary();
}

function updSec(sk) {
  const total = sectionTotal(sk);
  const done = sectionDone(sk);
  const f = document.getElementById('pf-'+sk);
  const t = document.getElementById('pt-'+sk);
  if (f) f.style.width = (total > 0 ? done/total*100 : 0) + '%';
  if (t) t.textContent = done + '/' + total;
}

function updAll() {
  const total = totalItems(), done = checkedItems();
  document.getElementById('ov-fill').style.width = (total > 0 ? done/total*100 : 0) + '%';
  document.getElementById('ov-count').textContent = done + ' / ' + total;
}

function markAllSec(sk) {
  const keys = sectionKeys(sk);
  const allDone = keys.every(k => state[k].done);
  keys.forEach(k => {
    state[k].done = !allDone;
    const elId = 'ci-' + k;
    const el = document.getElementById(elId);
    if (el) el.classList.toggle('done', !allDone);
  });
  updSec(sk);
  updAll();
  updSummary();
}

function resetAll() {
  if (!confirm('Reset all checkboxes and remarks?')) return;
  Object.keys(state).forEach(k => { state[k].done = false; state[k].remark = ''; });
  document.querySelectorAll('.ci.done, .oem-ci.done').forEach(e => e.classList.remove('done'));
  document.querySelectorAll('.rmk-inp').forEach(e => e.value = '');
  Object.keys(DATA).forEach(sk => updSec(sk));
  updAll();
  updSummary();
}

/* ===== RENDER HELPERS ===== */
function cardHead(sd, sk) {
  const total = sectionTotal(sk);
  return `<div class="sc-hd">
    <div class="sc-hd-row">
      <span class="sc-num">${sd.id}</span>
      <span class="sc-title">${sd.title}</span>
      <button class="sc-all" onclick="markAllSec('${sk}');event.stopPropagation()">ALL</button>
    </div>
    <div class="sc-pb-row">
      <div class="sc-pb-track"><div class="sc-pb-fill" id="pf-${sk}"></div></div>
      <span class="sc-pb-txt" id="pt-${sk}">0/${total}</span>
    </div>
  </div>`;
}

function tblHeader() {
  return `<div class="tbl-hdr th-std">
    <span>#</span><span>TEST / CHECK ITEM</span><span style="text-align:center">✓</span><span>REMARKS</span>
  </div>`;
}

function stdItem(sk, idx, text) {
  const key = sk+'-'+idx;
  return `<div class="ci ci-std" id="ci-${key}">
    <span class="ci-num">${idx+1}</span>
    <span class="ci-txt">${text}</span>
    <div class="chk-wrap"><div class="chk" onclick="toggleItem('${key}','ci-${key}')"></div></div>
    <div class="ci-remarks"><input class="rmk-inp" type="text" placeholder="Add remark..." oninput="state['${key}'].remark=this.value"></div>
  </div>`;
}

function renderStdSection(sk, sd) {
  const items = sd.items.map((t,i) => stdItem(sk,i,t)).join('');
  return `<div class="sc">
    ${cardHead(sd, sk)}
    ${tblHeader()}
    <div>${items}</div>
  </div>`;
}

function renderOEM(sk, sd) {
  const oemHdr = (col, label) => `<div class="oem-col-hdr"><span>${label}</span></div>`;
  const oemTH = `<div class="tbl-hdr th-std" style="grid-template-columns:18px 1fr 28px 1fr;padding:5px 10px">
    <span>#</span><span>NAME</span><span style="text-align:center">✓</span><span>REMARKS</span>
  </div>`;
  const oemItem = (sk, col, idx, text) => {
    const key = sk+'-'+col+'-'+idx;
    return `<div class="oem-ci" id="ci-${key}">
      <span class="ci-num">${idx+1}</span>
      <span class="ci-txt">${text}</span>
      <div class="chk-wrap"><div class="chk" onclick="toggleItem('${key}','ci-${key}')"></div></div>
      <div class="ci-remarks"><input class="rmk-inp" type="text" placeholder="..." oninput="state['${key}'].remark=this.value"></div>
    </div>`;
  };
  const col1Items = sd.col1.items.map((t,i) => oemItem(sk,'c1',i,t)).join('');
  const col2Items = sd.col2.items.map((t,i) => oemItem(sk,'c2',i,t)).join('');
  return `<div class="sc">
    ${cardHead(sd, sk)}
    <div class="oem-grid">
      <div class="oem-col">
        ${oemHdr('c1', sd.col1.label)}
        ${oemTH}
        ${col1Items}
      </div>
      <div class="oem-col">
        ${oemHdr('c2', sd.col2.label)}
        ${oemTH}
        ${col2Items}
      </div>
    </div>
  </div>`;
}

/* ===== SUMMARY ===== */
function updSummary() {
  SUMMARY_CATS.forEach(cat => {
    const total = sectionTotal(cat.key);
    const done = sectionDone(cat.key);
    const el_t = document.getElementById('sum-total-'+cat.key);
    const el_p = document.getElementById('sum-pass-'+cat.key);
    if (el_t) el_t.textContent = total || '';
    if (el_p) el_p.textContent = done || '';
  });
  /* Overall totals */
  const grandTotal = totalItems();
  const grandDone = checkedItems();
  const el_gt = document.getElementById('sum-grand-total');
  const el_gp = document.getElementById('sum-grand-pass');
  if (el_gt) el_gt.textContent = grandTotal;
  if (el_gp) el_gp.textContent = grandDone;
}

function renderSummary() {
  const rows = SUMMARY_CATS.map(cat => `
    <tr>
      <td class="cat-cell">${cat.label}</td>
      <td class="num-cell" id="sum-total-${cat.key}"></td>
      <td class="num-cell num-pass" id="sum-pass-${cat.key}"></td>
      <td class="num-cell num-fail"></td>
      <td class="num-cell num-na"></td>
      <td><input class="rmk-inp" type="text" placeholder="Remarks..."></td>
    </tr>`).join('');
  return `<div class="summary-card">
    <div class="sc-hd" style="padding:10px 14px">
      <div class="sc-hd-row" style="margin-bottom:0">
        <span class="sc-num">12</span>
        <span class="sc-title">TEST SUMMARY</span>
      </div>
    </div>
    <table class="summary-tbl">
      <thead>
        <tr>
          <th style="min-width:160px">Category</th>
          <th style="width:90px;text-align:center">Total Tests</th>
          <th style="width:90px;text-align:center">Passed (✓)</th>
          <th style="width:90px;text-align:center">Failed (✗)</th>
          <th style="width:120px;text-align:center">N/A</th>
          <th>Remarks</th>
        </tr>
      </thead>
      <tbody>
        ${rows}
        <tr class="total-row">
          <td class="cat-cell" style="font-family:'Barlow Condensed',sans-serif;font-weight:800;letter-spacing:1px;font-size:14px">TOTAL</td>
          <td class="num-cell" id="sum-grand-total"></td>
          <td class="num-cell num-pass" id="sum-grand-pass"></td>
          <td class="num-cell num-fail"></td>
          <td class="num-cell num-na"></td>
          <td></td>
        </tr>
      </tbody>
    </table>
  </div>`;
}

/* ===== RENDER ALL ===== */
function renderNotesSection() {
  return `<div class="sc row-1">
    <div class="sc-hd" style="padding:10px 14px">
      <div class="sc-hd-row" style="margin-bottom:0">
        <span class="sc-num">11</span>
        <span class="sc-title">OVERALL REMARKS / NOTES</span>
      </div>
    </div>
    <div class="notes-area">
      <textarea class="notes-input" placeholder="Add overall test notes, observations, or comparison data here..."></textarea>
    </div>
  </div>`;
}

function render() {
  initState();
  const root = document.getElementById('root');
  root.innerHTML = `
    <div class="pg-lbl">Page 1 of 2 — Setup, Software &amp; Core Tests</div>
    <div class="row-asymm">
      ${renderStdSection('s01', DATA.s01)}
      ${renderOEM('s02', DATA.s02)}
    </div>
    <div class="row-3">
      ${renderStdSection('s03', DATA.s03)}
      ${renderStdSection('s04', DATA.s04)}
      ${renderStdSection('s05', DATA.s05)}
    </div>
    <div class="row-3" style="margin-bottom:28px">
      ${renderStdSection('s06', DATA.s06)}
      ${renderStdSection('s07', DATA.s07)}
      ${renderStdSection('s08', DATA.s08)}
    </div>

    <div class="pg-lbl">Page 2 of 2 — Stability, Connectivity &amp; Summary</div>
    <div class="row-2">
      ${renderStdSection('s09', DATA.s09)}
      ${renderStdSection('s10', DATA.s10)}
    </div>
    ${renderNotesSection()}
    ${renderSummary()}

    <div class="tip">
      <div class="tip-ico">⭐</div>
      <div>
        <div class="tip-lbl">Tip</div>
        <div class="tip-txt">Run tests in different performance modes (Silent / Balanced / Performance / Turbo). Log results for comparison.</div>
      </div>
    </div>`;

  updAll();
  updSummary();
}

render();
</script>
</body>
</html>
